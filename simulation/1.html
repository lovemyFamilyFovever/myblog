<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>

<body>
    <h2>测试</h2>

    <div id="app">

        {{ message }}
        <hr>

        <button @click="addNumber">{{number}}</button>

        <hr>
        {{ fullName }}
        <hr>

        {{ greeting }}

        <button @click="greetOnce('Bob', 30)">点击测试</button>
    </div>
</body>

<script>

    new Vue({
        el: '#app',
        data: {
            number: 1,
            message: 'Hello Vue!',
            firstName: 'zhang',
            lastName: 'san'
        },
        computed: {
            fullName() {
                return this.firstName + ' ' + this.lastName;
            },
            greeting() {
                return 'Hello, ' + this.fullName + '!';
            }
        },
        methods: {
            addNumber() {
                this.number++;
            },
            greetOnce() {
                this.firstName = arguments[0];
                this.lastName = arguments[1];
            }
        }

    })

</script>

</html>
